run_name: v2_ablations
output_dir: experiments/runs
processed_dir: data/processed

# Each row removes exactly one component of SPC-HGT v2 (docs/12 §5).
models:
  - name: spc_hgt
    label: wo_path_attn
    config: { device: cuda, use_path: false, epochs: 30, seeds: [42] }
  - name: spc_hgt
    label: wo_contrastive
    config: { device: cuda, use_nce: false, epochs: 30, seeds: [42] }
  - name: spc_hgt
    label: wo_hard_neg
    config: { device: cuda, use_hard_neg: false, epochs: 30, seeds: [42] }
  - name: spc_hgt
    label: wo_text
    config: { device: cuda, use_text: false, epochs: 30, seeds: [42] }
