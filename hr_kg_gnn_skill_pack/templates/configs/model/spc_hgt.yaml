model:
  name: spc_hgt_matchnet
  schema_version: 1.0.0
  hidden_dim: 256
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  use_layer_norm: true
  use_residual: true
  use_edge_features: true
  use_skill_path_features: true
  use_text_encoder: true
  use_structured_features: true

text_encoder:
  name: sentence-transformer
  model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  output_dim: 384
  freeze: true

ranker:
  mlp_hidden_dims: [512, 256, 64]
  activation: relu
  output_activation: none
